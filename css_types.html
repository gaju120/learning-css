<!DOCTYPE html>
<html lang="en">

<head>

    <title>css types</title>
    <style>
        h1 {
            color: rgb(141, 92, 92);
        }

        h1 {
            color: blueviolet;
        }

        h2 {
            color: crimson;
        }
    </style>
    " /><link href="css/style.css" rel="stylesheet" type="text/css
</head>

<body>
    <!-- external css -->
    <h3>good morning everybody</h3>
    <h4>whats going on</h4>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Aliquam ipsa hic distinctio tempora reiciendis, iure
        doloremque obcaecati amet voluptas quo eaque quisquam aliquid, pariatur earum dolorem, eligendi beatae nihil
        harum.</p>
    <!-- internal css -->
    <h1>how are you</h1>
    <h1>what are you doing</h1>
    <h2>hii i am gajanan</h2>

    <center>
        <!-- inline css example -->
        <h1 style="color: chartreuse;background-color: blueviolet;">welcome to pune</h1>
        <h2 style="font-size: 50px; color: brown; background-color: aqua ;">hallo i am gajanan</h2>
    </center>
</body>

</html>
